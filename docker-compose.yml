services:
  vpn:
    image: qmcgaw/gluetun
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - VPN_SERVICE_PROVIDER=custom
      - VPN_TYPE=wireguard
      - WIREGUARD_PRIVATE_KEY=aPKk+yjvUvV6gJWN2p97J5MmKsRmTDbKT8dL7d//VVo=
      - WIREGUARD_ADDRESSES=10.2.0.2/32
      - WIREGUARD_PUBLIC_KEY=ZEQHDxg/HbjznRvApyBWfUGs6T20Rvy0/DctZk6FvB4=
      - WIREGUARD_ENDPOINT_IP=89.187.185.161
      - WIREGUARD_ENDPOINT_PORT=51820
      - DNS_ADDRESS=10.2.0.1
    ports:
      - "8080:8080"  # adjust to whatever port(s) your app needs
    restart: unless-stopped

  app:
    build: .
    command: bash start.sh
    restart: on-failure
    network_mode: "service:vpn"
    depends_on:
      - vpn
